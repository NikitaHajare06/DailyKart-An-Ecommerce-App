<div class="login-container">

  <div class="card login-card shadow">

    <h2 class="text-center mb-4">

      Login

    </h2>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="login()"
    >

      <div class="mb-3">

        <label class="form-label">

          Username

        </label>

        <input
          type="text"
          class="form-control"
          formControlName="username"
          placeholder="Enter Username"
        />

        <small
          class="text-danger"
          *ngIf="
            loginForm.get('username')
            ?.touched &&
            loginForm.get('username')
            ?.invalid
          "
        >

          Username is required

        </small>

      </div>

      <div class="mb-3">

        <label class="form-label">

          Password

        </label>

        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter Password"
        />

        <small
          class="text-danger"
          *ngIf="
            loginForm.get('password')
            ?.touched &&
            loginForm.get('password')
            ?.invalid
          "
        >

          Password is required

        </small>

      </div>

      <div
        *ngIf="errorMessage"
        class="alert alert-danger"
      >

        {{ errorMessage }}

      </div>

      <button
        type="submit"
        class="btn btn-dark w-100"
        [disabled]="isLoading"
      >

        <span *ngIf="!isLoading">

          Login

        </span>

        <span *ngIf="isLoading">

          Logging In...

        </span>

      </button>

      <div class="text-center mt-3">
        <p class="text-muted">
          Don't have an account? 
          <a routerLink="/register" class="text-primary">Register here</a>
        </p>
      </div>

    </form>

  </div>

</div>
